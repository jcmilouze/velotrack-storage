services:
  brouter-engine:
    image: woltapp/brouter:latest
    container_name: brouter-engine
    restart: always
    init: true
    expose:
      - 17777
    volumes:
      - ../brouter-infra/data:/brouter/segments
      - ../brouter-infra/profiles:/brouter/custom_profiles
    environment:
      - JAVA_OPTS=-Xmx2G -Xms1G
    deploy:
      resources:
        limits:
          memory: 2.5G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:17777/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - velotrack-net

networks:
  velotrack-net:
    driver: bridge
