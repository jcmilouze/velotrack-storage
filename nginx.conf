server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Compression GZIP pour améliorer les performances (SEO / UX)
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    location / {
        # Cette règle est CRITIQUE (try_files) :
        # Elle demande à Nginx de vérifier si le fichier demandé existe (ex: image.png).
        # S'il n'existe pas (ex: chemin React Router '/library'),
        # Nginx renvoie index.html, laissant l'application React gérer le routage.
        try_files $uri $uri/ /index.html;
    }

    # Cache optimal pour les assets statiques (images, css, js générés par Vite)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # Refuser l'accès aux fichiers cachés (.git, .env)
    location ~ /\. {
        deny all;
    }
}
